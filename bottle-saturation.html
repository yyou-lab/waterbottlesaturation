<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Product color saturation</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: #F5F5F3;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  .card {
    background: #fff;
    border-radius: 20px;
    padding: 1.75rem 2rem 2rem;
    max-width: 440px;
    width: 100%;
    box-shadow: 0 6px 32px rgba(0,0,0,0.09);
  }

  /* ── Description (top) ── */
  .description {
    margin-bottom: 1.25rem;
    text-align: center;
    font-size: 0.88rem;
    color: #444;
    line-height: 1.65;
  }

  .description strong {
    display: block;
    font-size: 0.65rem;
    font-style: normal;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #bbb;
    margin-bottom: 0.4rem;
  }

  /* ── Image area ── */
  .image-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 3 / 4;
    border-radius: 14px;
    overflow: hidden;
    background: #fff;
    margin-bottom: 1.75rem;
  }

  .image-wrap img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
    opacity: 0;
  }

  .image-wrap img.active {
    opacity: 1;
  }

  /* ── Slider ── */
  .slider-section {
    user-select: none;
  }

  .slider-track-wrap {
    position: relative;
    height: 28px;
    cursor: pointer;
  }

  .slider-track {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 28px;
    border-radius: 14px;
    background: linear-gradient(
      to right,
      #8fa6b6 0%,
      #6ba0c8 25%,
      #5badd4 50%,
      #3d6fc7 75%,
      #2b35c5 100%
    );
  }

  .tick {
    position: absolute;
    top: 4px;
    bottom: 4px;
    width: 1.5px;
    background: rgba(255,255,255,0.4);
    transform: translateX(-50%);
    pointer-events: none;
  }

  .slider-dot {
    position: absolute;
    top: 50%;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: #fff;
    border: 2.5px solid #1a1a1a;
    box-shadow: 0 2px 8px rgba(0,0,0,0.18);
    transform: translate(-50%, -50%);
    cursor: grab;
    z-index: 2;
  }

  .slider-dot:active { cursor: grabbing; }

  /* ── Color labels ── */
  .slider-labels {
    display: flex;
    justify-content: space-between;
    margin-top: 9px;
  }

  .slider-labels span {
    font-size: 0.62rem;
    color: #999;
    line-height: 1.3;
  }


</style>
</head>
<body>

<div class="card">

  <div class="description">
    <strong>Quick question</strong>
    You need a new water bottle. You'll use it every day — at work, at the gym, at the café. This is the one you're looking at. Which color do you go with?
  </div>

  <!-- ── Images ── swap each src with your own photo ── -->
  <div class="image-wrap">
    <img id="img-n50" class="placeholder-img"
         src="bottle-n50.jpg"
         alt="Very muted blue">
    <img id="img-n25" class="placeholder-img"
         src="bottle-n25.jpg"
         alt="Muted blue">
    <img id="img-0" class="placeholder-img active"
         src="bottle-0.jpg"
         alt="Blue">
    <img id="img-p25" class="placeholder-img"
         src="bottle-p25.jpg"
         alt="Vivid blue">
    <img id="img-p50" class="placeholder-img"
         src="bottle-p50.jpg"
         alt="Very vivid blue">
  </div>

  <!-- ── Slider ── -->
  <div class="slider-section">
    <div class="slider-track-wrap" id="track-wrap">
      <div class="slider-track"></div>
      <div class="tick" style="left:0%"></div>
      <div class="tick" style="left:25%"></div>
      <div class="tick" style="left:50%"></div>
      <div class="tick" style="left:75%"></div>
      <div class="tick" style="left:100%"></div>
      <div class="slider-dot" id="dot"></div>
    </div>

    <div class="slider-labels">
      <span style="text-align:left">Less<br>saturated</span>
      <span style="text-align:right">More<br>saturated</span>
    </div>
  </div>

</div>

<script>
  const POSITIONS = [
    { pct: 0,   imgId: 'img-n50' },
    { pct: 25,  imgId: 'img-n25' },
    { pct: 50,  imgId: 'img-0'   },
    { pct: 75,  imgId: 'img-p25' },
    { pct: 100, imgId: 'img-p50' },
  ];

  let activeIndex = 2;

  const dot         = document.getElementById('dot');
  const trackWrap   = document.getElementById('track-wrap');
  const imgs        = document.querySelectorAll('.placeholder-img');

  function snapToIndex(i) {
    activeIndex = i;
    dot.style.left = POSITIONS[i].pct + '%';
    imgs.forEach(img => img.classList.remove('active'));
    document.getElementById(POSITIONS[i].imgId).classList.add('active');
  }

  function nearestIndex(clientX) {
    const rect = trackWrap.getBoundingClientRect();
    const ratio = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
    const pct = ratio * 100;
    let best = 0, bestDist = Infinity;
    POSITIONS.forEach((p, i) => {
      const d = Math.abs(p.pct - pct);
      if (d < bestDist) { bestDist = d; best = i; }
    });
    return best;
  }

  trackWrap.addEventListener('click', e => snapToIndex(nearestIndex(e.clientX)));

  let dragging = false;
  dot.addEventListener('mousedown',  e => { dragging = true; e.stopPropagation(); e.preventDefault(); });
  document.addEventListener('mousemove', e => { if (dragging) snapToIndex(nearestIndex(e.clientX)); });
  document.addEventListener('mouseup',   () => { dragging = false; });

  dot.addEventListener('touchstart', e => { dragging = true; e.stopPropagation(); e.preventDefault(); }, { passive: false });
  document.addEventListener('touchmove', e => { if (dragging) snapToIndex(nearestIndex(e.touches[0].clientX)); }, { passive: false });
  document.addEventListener('touchend',  () => { dragging = false; });

  snapToIndex(2);
</script>

</body>
</html>
